name: Build Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
            os_name: 'macos'
            arch_suffix: 'aarch64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: '--target x86_64-unknown-linux-gnu'
            os_name: 'linux'
            arch_suffix: 'amd64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--target x86_64-pc-windows-msvc'
            os_name: 'windows'
            arch_suffix: 'x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app (build only, no upload)
        run: |
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            # macOS: build the .app, then package our own drag-and-drop DMG with install guides.
            pnpm tauri build ${{ matrix.args }} --bundles app --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            # Other platforms: normal build
            pnpm tauri build ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":false}}'
          fi
        shell: bash

      - name: Add macOS install guides to DMG
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          BUNDLE_DIR="./src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$BUNDLE_DIR/macos/Json Studio.app"
          VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version)")"
          DMG_PATH="$BUNDLE_DIR/dmg/Json Studio_${VERSION}_macos_${{ matrix.arch_suffix }}.dmg"
          TEMP_DIR="$(mktemp -d)"
          DMG_ROOT="$TEMP_DIR/dmg"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App not found at: $APP_PATH"
            ls -la "$BUNDLE_DIR/macos/" || true
            exit 1
          fi

          # Replace the linker-generated signature with a complete ad-hoc app bundle signature.
          # This still is not notarization, but it avoids distributing a bundle that macOS
          # treats as malformed before users can use the normal Gatekeeper override flow.
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          mkdir -p "$DMG_ROOT" "$BUNDLE_DIR/dmg"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          mkdir -p "$DMG_ROOT/.background"
          cp "src-tauri/dmg/background.png" "$DMG_ROOT/.background/background.png"

          rm -f "$DMG_PATH"
          RW_DMG="$TEMP_DIR/Json Studio.rw.dmg"
          MOUNT_DIR="/Volumes/Json Studio"

          hdiutil detach "$MOUNT_DIR" >/dev/null 2>&1 || true
          hdiutil create -volname "Json Studio" -srcfolder "$DMG_ROOT" -ov -format UDRW "$RW_DMG"
          hdiutil attach "$RW_DMG" -readwrite -noverify -noautoopen

          osascript <<'APPLESCRIPT'
          set applicationsFolder to POSIX file "/Applications" as alias
          tell application "Finder"
            tell disk "Json Studio"
              make new alias file at it to applicationsFolder with properties {name:"Applications"}
            end tell
          end tell
          APPLESCRIPT

          swift - <<'SWIFT'
          import AppKit

          let iconPath = "/System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/ApplicationsFolderIcon.icns"
          let aliasPath = "/Volumes/Json Studio/Applications"
          guard
            let icon = NSImage(contentsOfFile: iconPath),
            NSWorkspace.shared.setIcon(icon, forFile: aliasPath, options: [])
          else {
            fatalError("Failed to apply Applications folder icon")
          }
          SWIFT

          osascript <<'APPLESCRIPT'
          tell application "Finder"
            tell disk "Json Studio"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {120, 120, 780, 520}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 96
              set background picture of viewOptions to file ".background:background.png"
              set position of item "Json Studio.app" of container window to {180, 220}
              set position of item "Applications" of container window to {480, 220}
              close
              open
              update without registering applications
              delay 2
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$MOUNT_DIR"
          hdiutil convert "$RW_DMG" -format UDZO -o "$DMG_PATH"

          if [ ! -f "$DMG_PATH" ]; then
            echo "❌ Failed to create macOS DMG at: $DMG_PATH"
            exit 1
          fi

          echo "✓ macOS DMG created with drag-to-install layout: $DMG_PATH"
          ls -lh "$DMG_PATH"
          rm -rf "$TEMP_DIR"

      - name: Rename artifacts with OS name (for verification)
        shell: bash
        run: |
          BUNDLE_DIR="./src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version)")"
          
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            # Windows: rename .exe files (Tauri may replace spaces with dots in filename).
            shopt -s nullglob
            CANDIDATES=(
              "$BUNDLE_DIR/nsis/Json Studio"*"_x64-setup.exe"
              "$BUNDLE_DIR/nsis/Json.Studio"*"_x64-setup.exe"
            )
            RENAMED_EXE="$BUNDLE_DIR/nsis/Json Studio_${VERSION}_windows_${{ matrix.arch_suffix }}-setup.exe"

            if [ ${#CANDIDATES[@]} -gt 0 ]; then
              ORIGINAL_EXE="${CANDIDATES[0]}"
              if [ "$ORIGINAL_EXE" == "$RENAMED_EXE" ]; then
                echo "✓ Windows installer already named: $RENAMED_EXE"
              else
                mv "$ORIGINAL_EXE" "$RENAMED_EXE"
                echo "✓ Renamed Windows installer: $RENAMED_EXE"
              fi
            else
              echo "⚠ Windows installer not found"
              ls -la "$BUNDLE_DIR/nsis/" || true
            fi
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            # Linux: rename AppImage (Tauri may replace spaces with dots in filename).
            shopt -s nullglob
            CANDIDATES=(
              "$BUNDLE_DIR/appimage/Json Studio"*"_amd64.AppImage"
              "$BUNDLE_DIR/appimage/Json.Studio"*"_amd64.AppImage"
            )
            RENAMED_APPIMAGE="$BUNDLE_DIR/appimage/Json Studio_${VERSION}_linux_${{ matrix.arch_suffix }}.AppImage"

            if [ ${#CANDIDATES[@]} -gt 0 ]; then
              ORIGINAL_APPIMAGE="${CANDIDATES[0]}"
              if [ "$ORIGINAL_APPIMAGE" == "$RENAMED_APPIMAGE" ]; then
                echo "✓ Linux AppImage already named: $RENAMED_APPIMAGE"
              else
                mv "$ORIGINAL_APPIMAGE" "$RENAMED_APPIMAGE"
                echo "✓ Renamed Linux AppImage: $RENAMED_APPIMAGE"
              fi
            else
              echo "⚠ Linux AppImage not found"
              ls -la "$BUNDLE_DIR/appimage/" || true
            fi
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            # macOS: verify and rename the standard Tauri DMG.
            shopt -s nullglob
            CANDIDATES=(
              "$BUNDLE_DIR/dmg/Json Studio_${VERSION}_macos_${{ matrix.arch_suffix }}.dmg"
              "$BUNDLE_DIR/dmg/Json Studio"*"${{ matrix.arch_suffix }}.dmg"
              "$BUNDLE_DIR/dmg/Json.Studio"*"${{ matrix.arch_suffix }}.dmg"
            )
            RENAMED_DMG="$BUNDLE_DIR/dmg/Json Studio_${VERSION}_macos_${{ matrix.arch_suffix }}.dmg"

            if [ ${#CANDIDATES[@]} -gt 0 ]; then
              ORIGINAL_DMG="${CANDIDATES[0]}"
              if [ "$ORIGINAL_DMG" == "$RENAMED_DMG" ]; then
                echo "✓ macOS DMG already named: $RENAMED_DMG"
              else
                mv "$ORIGINAL_DMG" "$RENAMED_DMG"
                echo "✓ Renamed macOS DMG: $RENAMED_DMG"
              fi
            else
              echo "❌ macOS DMG not found"
              echo "Files in dmg directory:"
              ls -la "$BUNDLE_DIR/dmg/" || true
              exit 1
            fi
          fi
          
          # List renamed files for verification
          echo "Renamed artifacts:"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) | head -5
          else
            echo "Bundle directory not found: $BUNDLE_DIR"
          fi
