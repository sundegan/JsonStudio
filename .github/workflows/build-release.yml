name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.2.2)'
        required: true
        type: string

jobs:
  build-tauri:
    permissions:
      contents: read
    env:
      NODE_OPTIONS: --max-old-space-size=6144
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
            os_name: 'macos'
            arch_suffix: 'aarch64'
            updater_platform: 'darwin-aarch64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
            os_name: 'macos'
            arch_suffix: 'x64'
            updater_platform: 'darwin-x86_64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: '--target x86_64-unknown-linux-gnu'
            os_name: 'linux'
            arch_suffix: 'amd64'
            updater_platform: 'linux-x86_64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--target x86_64-pc-windows-msvc'
            os_name: 'windows'
            arch_suffix: 'x64'
            updater_platform: 'windows-x86_64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const tag = process.env.RELEASE_TAG;
          const expectedVersion = tag.replace(/^v/, '');
          const packageVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version;
          const tauriVersion = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version;

          if (packageVersion !== expectedVersion || tauriVersion !== expectedVersion) {
            throw new Error(
              `Release tag ${tag} must match package.json (${packageVersion}) and tauri.conf.json (${tauriVersion})`
            );
          }
          NODE
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app and updater artifacts
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret is required for signed updater artifacts."
            exit 1
          fi

          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            pnpm tauri build ${{ matrix.args }} --bundles app
          else
            pnpm tauri build ${{ matrix.args }}
          fi

      - name: Add macOS install guides to DMG
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          BUNDLE_DIR="./src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$BUNDLE_DIR/macos/Json Studio.app"
          VERSION="${{ github.event.inputs.tag_name || github.ref_name }}"
          DMG_PATH="$BUNDLE_DIR/dmg/Json Studio_${VERSION#v}_macos_${{ matrix.arch_suffix }}.dmg"
          TEMP_DIR="$(mktemp -d)"
          DMG_ROOT="$TEMP_DIR/dmg"

          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at: $APP_PATH"
            ls -la "$BUNDLE_DIR/macos/" || true
            exit 1
          fi

          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          mkdir -p "$DMG_ROOT" "$BUNDLE_DIR/dmg"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          mkdir -p "$DMG_ROOT/.background"
          cp "src-tauri/dmg/background.png" "$DMG_ROOT/.background/background.png"

          rm -f "$DMG_PATH"
          RW_DMG="$TEMP_DIR/Json Studio.rw.dmg"
          MOUNT_DIR="/Volumes/Json Studio"

          hdiutil detach "$MOUNT_DIR" >/dev/null 2>&1 || true
          hdiutil create -volname "Json Studio" -srcfolder "$DMG_ROOT" -ov -format UDRW "$RW_DMG"
          hdiutil attach "$RW_DMG" -readwrite -noverify -noautoopen

          osascript <<'APPLESCRIPT'
          set applicationsFolder to POSIX file "/Applications" as alias
          tell application "Finder"
            tell disk "Json Studio"
              make new alias file at it to applicationsFolder with properties {name:"Applications"}
            end tell
          end tell
          APPLESCRIPT

          swift - <<'SWIFT'
          import AppKit

          let iconPath = "/System/Library/CoreServices/CoreTypes.bundle/Contents/Resources/ApplicationsFolderIcon.icns"
          let aliasPath = "/Volumes/Json Studio/Applications"
          guard
            let icon = NSImage(contentsOfFile: iconPath),
            NSWorkspace.shared.setIcon(icon, forFile: aliasPath, options: [])
          else {
            fatalError("Failed to apply Applications folder icon")
          }
          SWIFT

          osascript <<'APPLESCRIPT'
          tell application "Finder"
            tell disk "Json Studio"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set the bounds of container window to {120, 120, 780, 520}
              set viewOptions to the icon view options of container window
              set arrangement of viewOptions to not arranged
              set icon size of viewOptions to 96
              set background picture of viewOptions to file ".background:background.png"
              set position of item "Json Studio.app" of container window to {180, 220}
              set position of item "Applications" of container window to {480, 220}
              close
              open
              update without registering applications
              delay 2
            end tell
          end tell
          APPLESCRIPT

          sync
          hdiutil detach "$MOUNT_DIR"
          hdiutil convert "$RW_DMG" -format UDZO -o "$DMG_PATH"

          if [ ! -f "$DMG_PATH" ]; then
            echo "Failed to create macOS DMG at: $DMG_PATH"
            exit 1
          fi

          ls -lh "$DMG_PATH"
          rm -rf "$TEMP_DIR"

      - name: Prepare release and updater artifacts
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_DIR="./src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          RELEASE_DIR="./release-assets"
          METADATA_DIR="./updater-metadata"
          UPDATER_PLATFORM="${{ matrix.updater_platform }}"

          mkdir -p "$RELEASE_DIR" "$METADATA_DIR"

          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            shopt -s nullglob
            INSTALLER_CANDIDATES=(
              "$BUNDLE_DIR/nsis/Json Studio"*"_x64-setup.exe"
              "$BUNDLE_DIR/nsis/Json.Studio"*"_x64-setup.exe"
            )
            UPDATER_FILE="$RELEASE_DIR/Json Studio_${VERSION_NO_V}_windows_${{ matrix.arch_suffix }}-setup.exe"

            if [ ${#INSTALLER_CANDIDATES[@]} -eq 0 ]; then
              echo "Windows installer not found"
              ls -la "$BUNDLE_DIR/nsis/" || true
              exit 1
            fi

            ORIGINAL_INSTALLER="${INSTALLER_CANDIDATES[0]}"
            ORIGINAL_SIG="$ORIGINAL_INSTALLER.sig"
            cp "$ORIGINAL_INSTALLER" "$UPDATER_FILE"
            cp "$ORIGINAL_SIG" "$UPDATER_FILE.sig"
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            shopt -s nullglob
            APPIMAGE_CANDIDATES=(
              "$BUNDLE_DIR/appimage/Json Studio"*"_amd64.AppImage"
              "$BUNDLE_DIR/appimage/Json.Studio"*"_amd64.AppImage"
            )
            UPDATER_FILE="$RELEASE_DIR/Json Studio_${VERSION_NO_V}_linux_${{ matrix.arch_suffix }}.AppImage"

            if [ ${#APPIMAGE_CANDIDATES[@]} -eq 0 ]; then
              echo "Linux AppImage not found"
              ls -la "$BUNDLE_DIR/appimage/" || true
              exit 1
            fi

            ORIGINAL_APPIMAGE="${APPIMAGE_CANDIDATES[0]}"
            ORIGINAL_SIG="$ORIGINAL_APPIMAGE.sig"
            cp "$ORIGINAL_APPIMAGE" "$UPDATER_FILE"
            cp "$ORIGINAL_SIG" "$UPDATER_FILE.sig"
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            shopt -s nullglob
            DMG_FILE="$BUNDLE_DIR/dmg/Json Studio_${VERSION_NO_V}_macos_${{ matrix.arch_suffix }}.dmg"
            ARCHIVE_CANDIDATES=(
              "$BUNDLE_DIR/macos/Json Studio.app.tar.gz"
              "$BUNDLE_DIR/macos/Json.Studio.app.tar.gz"
            )
            UPDATER_FILE="$RELEASE_DIR/Json Studio_${VERSION_NO_V}_macos_${{ matrix.arch_suffix }}.app.tar.gz"

            if [ ! -f "$DMG_FILE" ]; then
              echo "macOS DMG not found at $DMG_FILE"
              ls -la "$BUNDLE_DIR/dmg/" || true
              exit 1
            fi

            if [ ${#ARCHIVE_CANDIDATES[@]} -eq 0 ]; then
              echo "macOS updater archive not found"
              ls -la "$BUNDLE_DIR/macos/" || true
              exit 1
            fi

            ORIGINAL_ARCHIVE="${ARCHIVE_CANDIDATES[0]}"
            ORIGINAL_SIG="$ORIGINAL_ARCHIVE.sig"
            cp "$DMG_FILE" "$RELEASE_DIR/$(basename "$DMG_FILE")"
            cp "$ORIGINAL_ARCHIVE" "$UPDATER_FILE"
            cp "$ORIGINAL_SIG" "$UPDATER_FILE.sig"
          fi

          if [ ! -f "$UPDATER_FILE.sig" ]; then
            echo "Updater signature missing for $UPDATER_FILE"
            find "$BUNDLE_DIR" -type f -name "*.sig" -print
            exit 1
          fi

          export METADATA_DIR UPDATER_FILE UPDATER_PLATFORM
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const metadataDir = process.env.METADATA_DIR;
          const updaterFile = process.env.UPDATER_FILE;
          const platform = process.env.UPDATER_PLATFORM;
          const signature = fs.readFileSync(`${updaterFile}.sig`, 'utf8').trim();

          fs.writeFileSync(
            path.join(metadataDir, `${platform}.json`),
            JSON.stringify(
              {
                platform,
                asset: path.basename(updaterFile),
                signature,
              },
              null,
              2
            )
          );
          NODE

          find "$RELEASE_DIR" -maxdepth 1 -type f -print
          find "$METADATA_DIR" -maxdepth 1 -type f -print

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: release-files-${{ matrix.os_name }}-${{ matrix.arch_suffix }}
          path: release-assets/*
          if-no-files-found: error

      - name: Upload updater metadata
        uses: actions/upload-artifact@v4
        with:
          name: updater-metadata-${{ matrix.os_name }}-${{ matrix.arch_suffix }}
          path: updater-metadata/*.json
          if-no-files-found: error

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          pattern: release-files-*
          path: dist/release
          merge-multiple: true

      - name: Download updater metadata
        uses: actions/download-artifact@v4
        with:
          pattern: updater-metadata-*
          path: dist/updater-metadata
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const repo = process.env.GITHUB_REPOSITORY;
          const tag = process.env.RELEASE_TAG;
          const version = tag.replace(/^v/, '');
          const metadataDir = 'dist/updater-metadata';
          const releaseDir = 'dist/release';
          const platforms = {};

          for (const file of fs.readdirSync(metadataDir)) {
            if (!file.endsWith('.json')) continue;
            const metadata = JSON.parse(fs.readFileSync(path.join(metadataDir, file), 'utf8'));
            platforms[metadata.platform] = {
              signature: metadata.signature,
              url: `https://github.com/${repo}/releases/download/${encodeURIComponent(tag)}/${encodeURIComponent(metadata.asset)}`,
            };
          }

          const requiredPlatforms = ['darwin-aarch64', 'darwin-x86_64', 'linux-x86_64', 'windows-x86_64'];
          const missing = requiredPlatforms.filter((platform) => !platforms[platform]);
          if (missing.length > 0) {
            throw new Error(`Missing updater metadata for ${missing.join(', ')}`);
          }

          fs.writeFileSync(
            path.join(releaseDir, 'latest.json'),
            JSON.stringify(
              {
                version,
                notes: `See https://github.com/${repo}/releases/tag/${encodeURIComponent(tag)}`,
                pub_date: new Date().toISOString(),
                platforms,
              },
              null,
              2
            )
          );
          NODE

          cat dist/release/latest.json
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: dist/release/*
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: 'Json Studio ${{ github.event.inputs.tag_name || github.ref_name }}'
          body: |
            View changelog: https://github.com/${{ github.repository }}/CHANGELOG.md

            Auto-update metadata is published as `latest.json` for the Tauri updater.

            macOS note: download the DMG for your Mac architecture, open it, then drag `Json Studio.app` into Applications. These builds are not Apple Developer ID notarized, so macOS may ask you to confirm the first launch via right-click Open or System Settings > Privacy & Security.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
