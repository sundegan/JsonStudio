name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggered when pushing tags starting with 'v' (e.g., v0.1.0)
  workflow_dispatch:  # Allow manual trigger
    inputs:
      tag_name:
        description: 'Tag name (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
            os_name: 'macos'
            arch_suffix: 'aarch64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin'
            os_name: 'macos'
            arch_suffix: 'x64'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: '--target x86_64-unknown-linux-gnu'
            os_name: 'linux'
            arch_suffix: 'amd64'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--target x86_64-pc-windows-msvc'
            os_name: 'windows'
            arch_suffix: 'x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history including tag information

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app (without auto-upload)
        run: |
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            # macOS: build the standard Tauri DMG for drag-and-drop installation.
            pnpm tauri build ${{ matrix.args }} --bundles dmg
          else
            # Other platforms: normal build
            pnpm tauri build ${{ matrix.args }}
          fi
        shell: bash

      - name: Add macOS install guides to DMG
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          BUNDLE_DIR="./src-tauri/target/${{ matrix.target }}/release/bundle"
          APP_PATH="$BUNDLE_DIR/macos/Json Studio.app"
          VERSION="${{ github.event.inputs.tag_name || github.ref_name }}"
          DMG_PATH="$BUNDLE_DIR/dmg/Json Studio_${VERSION#v}_macos_${{ matrix.arch_suffix }}.dmg"
          TEMP_DIR="$(mktemp -d)"
          DMG_ROOT="$TEMP_DIR/dmg"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App not found at: $APP_PATH"
            ls -la "$BUNDLE_DIR/macos/" || true
            exit 1
          fi

          mkdir -p "$DMG_ROOT" "$BUNDLE_DIR/dmg"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"
          cp "src-tauri/dmg/README_EN.txt" "$DMG_ROOT/README - English.txt"
          cp "src-tauri/dmg/README_ZH.txt" "$DMG_ROOT/安装说明 - 中文.txt"

          rm -f "$DMG_PATH"
          hdiutil create -volname "Json Studio" -srcfolder "$DMG_ROOT" -ov -format UDZO "$DMG_PATH"

          if [ ! -f "$DMG_PATH" ]; then
            echo "❌ Failed to create macOS DMG at: $DMG_PATH"
            exit 1
          fi

          echo "✓ macOS DMG created with install guides: $DMG_PATH"
          ls -lh "$DMG_PATH"
          rm -rf "$TEMP_DIR"

      - name: Rename artifacts with OS name
        shell: bash
        run: |
          BUNDLE_DIR="./src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="${{ github.event.inputs.tag_name || github.ref_name }}"
          
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            # Windows: rename .exe files (Tauri may replace spaces with dots in filename)
            # Match any version suffix to avoid mismatches between tag and app version.
            shopt -s nullglob
            CANDIDATES=(
              "$BUNDLE_DIR/nsis/Json Studio"*"_x64-setup.exe"
              "$BUNDLE_DIR/nsis/Json.Studio"*"_x64-setup.exe"
            )
            RENAMED_EXE="$BUNDLE_DIR/nsis/Json Studio_${VERSION#v}_windows_${{ matrix.arch_suffix }}-setup.exe"
            
            if [ ${#CANDIDATES[@]} -gt 0 ]; then
              ORIGINAL_EXE="${CANDIDATES[0]}"
              if [ "$ORIGINAL_EXE" == "$RENAMED_EXE" ]; then
                echo "✓ Windows installer already named: $RENAMED_EXE"
              else
                mv "$ORIGINAL_EXE" "$RENAMED_EXE"
                echo "✓ Renamed Windows installer: $RENAMED_EXE"
              fi
            else
              echo "❌ Windows installer not found"
              echo "Files in nsis directory:"
              ls -la "$BUNDLE_DIR/nsis/" || true
              exit 1
            fi
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            # Linux: rename AppImage (Tauri may replace spaces with dots in filename)
            # Match any version suffix to avoid mismatches between tag and app version.
            shopt -s nullglob
            CANDIDATES=(
              "$BUNDLE_DIR/appimage/Json Studio"*"_amd64.AppImage"
              "$BUNDLE_DIR/appimage/Json.Studio"*"_amd64.AppImage"
            )
            RENAMED_APPIMAGE="$BUNDLE_DIR/appimage/Json Studio_${VERSION#v}_linux_${{ matrix.arch_suffix }}.AppImage"
            
            if [ ${#CANDIDATES[@]} -gt 0 ]; then
              ORIGINAL_APPIMAGE="${CANDIDATES[0]}"
              if [ "$ORIGINAL_APPIMAGE" == "$RENAMED_APPIMAGE" ]; then
                echo "✓ Linux AppImage already named: $RENAMED_APPIMAGE"
              else
                mv "$ORIGINAL_APPIMAGE" "$RENAMED_APPIMAGE"
                echo "✓ Renamed Linux AppImage: $RENAMED_APPIMAGE"
              fi
            else
              echo "❌ Linux AppImage not found"
              echo "Files in appimage directory:"
              ls -la "$BUNDLE_DIR/appimage/" || true
              exit 1
            fi
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            # macOS: rename the standard Tauri DMG for release upload.
            shopt -s nullglob
            CANDIDATES=(
              "$BUNDLE_DIR/dmg/Json Studio_${VERSION#v}_macos_${{ matrix.arch_suffix }}.dmg"
              "$BUNDLE_DIR/dmg/Json Studio"*"${{ matrix.arch_suffix }}.dmg"
              "$BUNDLE_DIR/dmg/Json.Studio"*"${{ matrix.arch_suffix }}.dmg"
            )
            RENAMED_DMG="$BUNDLE_DIR/dmg/Json Studio_${VERSION#v}_macos_${{ matrix.arch_suffix }}.dmg"

            if [ ${#CANDIDATES[@]} -gt 0 ]; then
              ORIGINAL_DMG="${CANDIDATES[0]}"
              if [ "$ORIGINAL_DMG" == "$RENAMED_DMG" ]; then
                echo "✓ macOS DMG already named: $RENAMED_DMG"
              else
                mv "$ORIGINAL_DMG" "$RENAMED_DMG"
                echo "✓ Renamed macOS DMG: $RENAMED_DMG"
              fi
            else
              echo "❌ macOS DMG not found"
              echo "Files in dmg directory:"
              ls -la "$BUNDLE_DIR/dmg/" || true
              exit 1
            fi
          fi

      - name: Prepare upload file path
        shell: bash
        run: |
          BUNDLE_DIR="./src-tauri/target/${{ matrix.target }}/release/bundle"
          VERSION="${{ github.event.inputs.tag_name || github.ref_name }}"
          
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            # Windows: find renamed .exe file
            EXE_FILE="$BUNDLE_DIR/nsis/Json Studio_${VERSION#v}_windows_${{ matrix.arch_suffix }}-setup.exe"
            if [ -f "$EXE_FILE" ]; then
              echo "UPLOAD_FILE=$EXE_FILE" >> $GITHUB_ENV
              echo "✓ Found Windows installer: $EXE_FILE"
            else
              echo "❌ Windows installer not found at: $EXE_FILE"
              ls -la "$BUNDLE_DIR/nsis/" || true
              exit 1
            fi
          elif [ "${{ matrix.platform }}" == "ubuntu-22.04" ]; then
            # Linux: find renamed AppImage
            APPIMAGE_FILE="$BUNDLE_DIR/appimage/Json Studio_${VERSION#v}_linux_${{ matrix.arch_suffix }}.AppImage"
            if [ -f "$APPIMAGE_FILE" ]; then
              echo "UPLOAD_FILE=$APPIMAGE_FILE" >> $GITHUB_ENV
              echo "✓ Found Linux AppImage: $APPIMAGE_FILE"
            else
              echo "❌ Linux AppImage not found at: $APPIMAGE_FILE"
              ls -la "$BUNDLE_DIR/appimage/" || true
              exit 1
            fi
          elif [ "${{ matrix.platform }}" == "macos-latest" ]; then
            # macOS: find renamed standard DMG
            DMG_FILE="$BUNDLE_DIR/dmg/Json Studio_${VERSION#v}_macos_${{ matrix.arch_suffix }}.dmg"
            if [ -f "$DMG_FILE" ]; then
              echo "UPLOAD_FILE=$DMG_FILE" >> $GITHUB_ENV
              echo "✓ Found macOS DMG: $DMG_FILE"
            else
              echo "❌ macOS DMG not found at: $DMG_FILE"
              ls -la "$BUNDLE_DIR/dmg/" || true
              exit 1
            fi
          fi

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: ${{ env.UPLOAD_FILE }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: 'Json Studio ${{ github.event.inputs.tag_name || github.ref_name }}'
          body: |
            View changelog: https://github.com/${{ github.repository }}/CHANGELOG.md

            macOS note: download the DMG for your Mac architecture, open it, then drag `Json Studio.app` into Applications. These builds are not Apple Developer ID notarized, so macOS may ask you to confirm the first launch via right-click Open or System Settings > Privacy & Security.
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: ${{ env.UPLOAD_FILE }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: 'Json Studio ${{ github.event.inputs.tag_name || github.ref_name }}'
          body: |
            View changelog: https://github.com/${{ github.repository }}/CHANGELOG.md

            macOS note: download the DMG for your Mac architecture, open it, then drag `Json Studio.app` into Applications. These builds are not Apple Developer ID notarized, so macOS may ask you to confirm the first launch via right-click Open or System Settings > Privacy & Security.
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: ${{ env.UPLOAD_FILE }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: 'Json Studio ${{ github.event.inputs.tag_name || github.ref_name }}'
          body: |
            View changelog: https://github.com/${{ github.repository }}/CHANGELOG.md

            macOS note: download the DMG for your Mac architecture, open it, then drag `Json Studio.app` into Applications. These builds are not Apple Developer ID notarized, so macOS may ask you to confirm the first launch via right-click Open or System Settings > Privacy & Security.
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
